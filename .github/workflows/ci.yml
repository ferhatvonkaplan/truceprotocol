name: TATF CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  benchmark:
    name: TATF Benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate benchmark dataset
        run: cd benchmarks && python generate_benchmark.py --agents 100 --output datasets/test_run.jsonl

      - name: Evaluate benchmark
        run: |
          cd benchmarks
          mkdir -p evaluation
          python evaluate.py --dataset datasets/test_run.jsonl --output evaluation/test_results.json

      - name: Print accuracy
        run: python -c "import json; r=json.load(open('benchmarks/evaluation/test_results.json')); print(f'Accuracy:{r[\"accuracy\"]:.1%}')"

  spec-lint:
    name: Spec files check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check spec files exist
        run: |
          for f in 00-introduction 01-scoring-model 02-behavioral-baselines 03-anomaly-detection 04-trust-attestation 05-adversarial-testing 06-market-stress; do
            test -f "spec/v0.1/${f}.md" || (echo "MISSING: spec/v0.1/${f}.md" && exit 1)
          done
          echo "All 7 spec files present."

  truce-py-test:
    name: truce-py (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    defaults:
      run:
        working-directory: truce-py
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev,crypto]"

      - name: Run tests
        run: pytest tests/ -v
