name: TATF CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate benchmark dataset
        run: cd benchmarks && python generate_benchmark.py --agents 100 --output datasets/test_run.jsonl

      - name: Evaluate benchmark
        run: cd benchmarks && python evaluate.py --dataset datasets/test_run.jsonl --output evaluation/test_results.json

      - name: Print accuracy
        shell: python
        run: |
          import json
          with open('benchmarks/evaluation/test_results.json') as f:
              r = json.load(f)
          acc = r.get('accuracy', 'N/A')
          print(f'Accuracy: {acc}')

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check spec files exist
        run: ls spec/v0.1/*.md
